# =============================================
# logic-layer/src/main/resources/application.properties
# =============================================

spring.application.name=logic-layer

# --- Database ---
spring.datasource.url=jdbc:mariadb://localhost:3306/smartroomms
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# --- Server ---
server.port=8081

# =============================================
# JWT - Change jwt.secret before deploy!
# =============================================
jwt.secret=mjasdjkahjasjdsklasdhkalsdkjlsdalja18dasdsdasdasdada
jwt.expiration=86400000

# =============================================
# Firebase Cloud Messaging (FCM)
# =============================================
fcm.server-key=fjpoapworuu3-diw-9diu-asdiadasd9asfasdxrdadasdasdsad

# =============================================
# Email (SMTP)
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-gmail@gmail.com
spring.mail.password=your-16-char-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.mail.from=your-gmail@gmail.com
app.mail.enabled=false

# =============================================
# Scheduling
# =============================================
spring.task.scheduling.pool.size=5

# =============================================
# Logging Configuration
# =============================================
logging.level.root=WARN
logging.level.org.springframework=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.com.project=DEBUG
logging.level.org.springframework.mail=DEBUG

# Controllers and Services Logging - IMPORTANT FOR DEBUGGING APIs
logging.level.com.project.logiclayer.controller=INFO
logging.level.com.project.logiclayer.service=DEBUG
logging.level.com.project.datalayer.repository=DEBUG

# Logging format and file output
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.file.name=logs/smartroomms.log
logging.file.max-size=10MB
logging.file.max-history=10

